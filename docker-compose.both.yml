name: mtproto-suite

# Полный стек на одной машине: панель + нода.
# Использование: docker compose -f docker-compose.both.yml up -d

services:
  # ============ Панель управления ============
  db:
    image: postgres:16-alpine
    container_name: mtproto-suite-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mtproto_panel}
      POSTGRES_USER: ${DB_USER:-mtproto}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mtproto} -d ${DB_NAME:-mtproto_panel}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mtproto-net

  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ns8-support/mtproto-suite}/panel-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: panel-backend/Dockerfile
      provenance: false
    container_name: mtproto-suite-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/project:ro
    environment:
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-mtproto_panel}
      DB_USER: ${DB_USER:-mtproto}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NODE_REQUEST_TIMEOUT_MS: 5000
      NODE_ENV: production
    networks:
      - mtproto-net

  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ns8-support/mtproto-suite}/panel-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: panel-frontend/Dockerfile
      provenance: false
    container_name: mtproto-suite-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-80}:80"
    networks:
      - mtproto-net

  # ============ Сервис-нода ============
  service-node:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ns8-support/mtproto-suite}/service-node:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: service-node/Dockerfile
      provenance: false
    container_name: mtproto-suite-service-node
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./service-node/data:/app/data
      - .:/app/project:ro
    environment:
      PORT: "8443"
      AUTH_TOKEN: ${AUTH_TOKEN}
      NGINX_PORT: ${NGINX_PORT:-443}
      DATA_DIR: /app/data
      NAT_IP: ${NAT_IP:-}
      TUNNEL_INTERFACE: ${TUNNEL_INTERFACE:-}
    ports:
      # API ноды
      - "127.0.0.1:${NODE_PORT:-8443}:8443"
      # Прокси-трафик (тоже на localhost, чтобы фронт не конфликтовал)
      - "127.0.0.1:${NGINX_PORT:-443}:443"
    networks:
      - mtproto-net

volumes:
  pgdata:

networks:
  mtproto-net:
    name: mtproto-net
    driver: bridge
