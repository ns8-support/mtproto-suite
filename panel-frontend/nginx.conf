# Default config (HTTP only)
# Этот файл используется если SSL-сертификаты не смонтированы.
server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:$BACKEND_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}

# SSL config — активируется только если /etc/nginx/ssl/cert.pem существует
# (через механизм "if exists on FS" не поддерживается напрямую, поэтому
#  используется отдельный конфиг, монтируемый через docker-compose.ssl.yml)
